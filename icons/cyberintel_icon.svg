  <circle cx="100" cy="105" r="12" fill="black"/>
  <circle cx="103" cy="102" r="4" fill="white"/>
  
  <!-- Pequeño detalle de datos/información (líneas binarias) -->
  <line x1="70" y1="130" x2="80" y2="130" stroke="black" stroke-width="2"/>
  <line x1="85" y1="130" x2="90" y2="130" stroke="black" stroke-width="2"/>
  <line x1="110" y1="130" x2="115" y2="130" stroke="black" stroke-width="2"/>
