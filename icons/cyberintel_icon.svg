<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Escudo/shield base representando ciberseguridad -->
  <path d="M 100 40 L 150 65 L 150 110 Q 150 145 100 170 Q 50 145 50 110 L 50 65 Z" fill="none" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  
