<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Tres servidores/activos apilados -->
  
  <!-- Servidor 1 (superior) -->
  <rect x="60" y="50" width="80" height="30" fill="none" stroke="black" stroke-width="3" rx="3"/>
  <line x1="70" y1="60" x2="130" y2="60" stroke="black" stroke-width="2"/>
  <line x1="70" y1="65" x2="130" y2="65" stroke="black" stroke-width="1.5"/>
  <circle cx="75" cy="72" r="2" fill="black"/>
  <circle cx="82" cy="72" r="2" fill="black"/>
  <circle cx="89" cy="72" r="2" fill="black"/>
  
  <!-- Servidor 2 (medio) -->
  <rect x="60" y="90" width="80" height="30" fill="none" stroke="black" stroke-width="3" rx="3"/>
  <line x1="70" y1="100" x2="130" y2="100" stroke="black" stroke-width="2"/>
  <line x1="70" y1="105" x2="130" y2="105" stroke="black" stroke-width="1.5"/>
  <circle cx="75" cy="112" r="2" fill="black"/>
  <circle cx="82" cy="112" r="2" fill="black"/>
  <circle cx="89" cy="112" r="2" fill="black"/>
  
  <!-- Servidor 3 (inferior) -->
  <rect x="60" y="130" width="80" height="30" fill="none" stroke="black" stroke-width="3" rx="3"/>
  <line x1="70" y1="140" x2="130" y2="140" stroke="black" stroke-width="2"/>
  <line x1="70" y1="145" x2="130" y2="145" stroke="black" stroke-width="1.5"/>
  <circle cx="75" cy="152" r="2" fill="black"/>
  <circle cx="82" cy="152" r="2" fill="black"/>
  <circle cx="89" cy="152" r="2" fill="black"/>
  
  <!-- Etiquetas numeradas -->
  <text x="125" y="68" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="black">1</text>
  <text x="125" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="black">2</text>
  <text x="125" y="148" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="black">3</text>
  
  <!-- Lupa indicando catalogación -->
  <circle cx="150" cy="70" r="15" fill="none" stroke="black" stroke-width="3"/>
  <line x1="161" y1="81" x2="172" y2="92" stroke="black" stroke-width="3" stroke-linecap="round"/>
</svg>
