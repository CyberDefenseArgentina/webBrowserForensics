<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Clipboard/tabla base -->
  <rect x="50" y="30" width="100" height="140" fill="none" stroke="black" stroke-width="4" rx="5"/>
  
  <!-- Clip superior -->
  <rect x="85" y="20" width="30" height="15" fill="none" stroke="black" stroke-width="3" rx="3"/>
  
  <!-- Líneas de lista/inventario -->
  <line x1="65" y1="55" x2="135" y2="55" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="75" x2="135" y2="75" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="95" x2="135" y2="95" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="115" x2="135" y2="115" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="135" x2="135" y2="135" stroke="black" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Checkboxes/viñetas al lado izquierdo -->
  <rect x="65" y="48" width="10" height="10" fill="none" stroke="black" stroke-width="2"/>
  <rect x="65" y="68" width="10" height="10" fill="none" stroke="black" stroke-width="2"/>
  <rect x="65" y="88" width="10" height="10" fill="none" stroke="black" stroke-width="2"/>
  <rect x="65" y="108" width="10" height="10" fill="none" stroke="black" stroke-width="2"/>
  <rect x="65" y="128" width="10" height="10" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Checks en algunos items -->
  <polyline points="67,53 69,56 73,50" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="67,93 69,96 73,90" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="67,133 69,136 73,130" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Ícono de servidor/activo en la parte superior -->
  <rect x="90" y="152" width="20" height="12" fill="none" stroke="black" stroke-width="2" rx="1"/>
  <line x1="93" y1="155" x2="107" y2="155" stroke="black" stroke-width="1"/>
  <line x1="93" y1="158" x2="107" y2="158" stroke="black" stroke-width="1"/>
  <circle cx="94" cy="161" r="1" fill="black"/>
  <circle cx="97" cy="161" r="1" fill="black"/>
</svg>
