<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Carpeta/folder base -->
  <path d="M 40 60 L 40 160 L 160 160 L 160 70 L 110 70 L 100 60 Z" fill="none" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Tab de la carpeta -->
  <path d="M 40 60 L 100 60 L 110 70 L 160 70" fill="none" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Globo/web dentro de la carpeta -->
  <circle cx="100" cy="110" r="30" fill="none" stroke="black" stroke-width="3"/>
  
  <!-- Líneas horizontales del globo (latitud) -->
  <ellipse cx="100" cy="110" rx="30" ry="10" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="100" cy="110" rx="30" ry="20" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Líneas verticales del globo (longitud) -->
  <ellipse cx="100" cy="110" rx="10" ry="30" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="100" cy="110" rx="20" ry="30" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Símbolo de "más" indicando adición -->
  <circle cx="145" cy="95" r="12" fill="white" stroke="black" stroke-width="3"/>
  <line x1="145" y1="88" x2="145" y2="102" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="95" x2="152" y2="95" stroke="black" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Etiqueta en la carpeta (opcional) -->
  <rect x="50" y="67" width="25" height="8" fill="none" stroke="black" stroke-width="1.5" rx="1"/>
</svg>
