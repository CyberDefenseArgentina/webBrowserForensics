<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Escudo con grieta (vulnerabilidad) -->
  <path d="M 70 40 L 110 60 L 110 100 Q 110 130 90 150 Q 70 130 70 100 L 70 60 Z" fill="none" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Grieta en el escudo -->
  <path d="M 90 65 L 85 80 L 92 95 L 88 110" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Llave inglesa/herramienta de reparación -->
  <g transform="translate(110, 80)">
    <!-- Mango de la llave -->
    <rect x="0" y="15" width="50" height="8" fill="none" stroke="black" stroke-width="3" rx="2"/>
    
    <!-- Cabeza de la llave ajustable -->
    <path d="M 0 15 L -8 15 L -8 10 L -3 10 L -3 12 L 0 12 Z" fill="none" stroke="black" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 0 23 L -8 23 L -8 28 L -3 28 L -3 26 L 0 26 Z" fill="none" stroke="black" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Detalle de ajuste -->
    <line x1="-5" y1="15" x2="-5" y2="23" stroke="black" stroke-width="2"/>
  </g>
  
  <!-- Checkmark indicando corrección -->
  <polyline points="125,125 135,140 160,110" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Lista/reporte de vulnerabilidades -->
  <rect x="30" y="120" width="35" height="50" fill="none" stroke="black" stroke-width="3" rx="2"/>
  <line x1="35" y1="130" x2="60" y2="130" stroke="black" stroke-width="2"/>
  <line x1="35" y1="140" x2="60" y2="140" stroke="black" stroke-width="2"/>
  <line x1="35" y1="150" x2="60" y2="150" stroke="black" stroke-width="2"/>
  <line x1="35" y1="160" x2="55" y2="160" stroke="black" stroke-width="2"/>
</svg>
